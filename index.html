<html>
<head>
    <title>ANIMACIONES CCS - ANIMATION</title>
    <style>
        h1{
            font-family: "century gothic";
            color: rgba(165, 42, 42, 0);
            text-align: center;

            animation-name: titulo;
            animation-duration: 4s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards; /* forwards hace que la animacion permanezca en el ultimo fotograma y backwards en el primero */
        }

        @keyframes titulo{
            from{                               /* como inicia */
                color: rgba(165, 42, 42, 0);
            }
            to{                                 /* como termina */
                color: rgba(165, 42, 42, 1);
            }
        }

        p{
            text-align: center;
            font-family: "century gothic";
            font-weight: bold;
            animation-name: texto;
            animation-duration: 2s;
            animation-iteration-count: 1;
            animation-fill-mode: backwards;
            animation-delay: 3s;
        }

        @keyframes texto{
            from{
                color: rgba(0, 0, 0, 0);
            }
            to{
                color: rgba(0, 0, 0, 1);
            }
        }

        img{
            height: 300px;
            width: 300px;
            display: block; /* centrar imagen */
            margin: auto;   /* centrar imagen */
            animation: imagen 2s 6s 1 forwards; /* puedes poner de frente nombre, duration, delay, iteration y fill mode */
            opacity: 0;
  
        }

        @keyframes imagen{
            from{opacity: 0;}
            to{opacity: 1;}
        }


    </style>
</head>

<body>
    <h1>PROMOCION 2026 - CI</h1> <!-- titulos -->
    <p>IESTP MANUEL SEOANE CORRALES</p>
    <img src="img/logo.png"
</body>

</html>
