    <style>
        body{
            background-color: rgb(0, 0, 0);
            animation-name: fondo;
            animation-iteration-count: 1;
            animation-duration: 4s;
            animation-fill-mode: forwards;
        }

        @keyframes fondo {
            from{background-color: rgb(0, 0, 0);}
            to{ background-color: rgb(11, 185, 127);}
            
        }

        .img1{
            height: 400px;
            width: 550px;
            display: block;
            margin: auto;

            animation-name: img1;
            animation-duration: 4s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
            opacity: 0;
        }

        @keyframes img1 {
            from{opacity: 0;}
            to{opacity: 1;}
        }

        h1{
            font-family: "Bebas Neue", sans-serif;
            font-weight: 800;
            font-style: normal;
            color:rgb(255, 255, 255);
            text-align: center;

            animation-name: titulo;
            animation-duration: 2s;
            animation-delay: 4s;
            animation-iteration-count: 1;
            animation-fill-mode: backwards;
        }

         @keyframes titulo{
            from{                              
                color: rgba(255, 255, 255, 0);
            }
            to{                                 
                color: rgb(255, 255, 255);
            }
        }

        .p1{
            font-family: "Bebas Neue", sans-serif;
            font-weight: 400;
            font-style: normal;
            color:rgb(0, 0, 0);
            text-align: center;

            animation-name: p1;
            animation-duration: 2s;
            animation-iteration-count: 1;
            animation-fill-mode: backwards;
            animation-delay: 6s;
        }

        @keyframes p1{
            from{color: rgba(0, 0, 0, 0);}
            to{color: rgb(0, 0, 0)}
        }

        .img2{
            height: 350px;
            width: 450px;
            display: block;
            margin: auto;

            animation-name: img2;
            animation-duration: 2s;
            animation-iteration-count: 1;
            animation-fill-mode: forwards;
            animation-delay: 8s;
            opacity: 0;
        }

        @keyframes img2 {
            from{opacity: 0;}
            to{opacity: 1;}
        }

        .p2{
            font-family: "Bebas Neue", sans-serif;
            font-weight: 400;
            font-style: normal;
            color:rgb(0, 0, 0);
            text-align: center;

            animation-name: p2;
            animation-duration: 2s;
            animation-iteration-count: 1;
            animation-fill-mode: backwards;
            animation-delay: 10s;
        }
        
        @keyframes p2 {
            from{                              
                color: rgba(0, 0, 0, 0);
            }
            to{                                 
                color: rgb(0, 0, 0);
            }
        }


    </style>
